version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    groups:
      all-gha:
        patterns:
        - "*"

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    groups:
      all-go-mod:
        patterns:
        - "*"

  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: daily
    commit-message:
      prefix: "chore"

  - package-ecosystem: "npm"
    directory: "/docs-website"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    groups:
      all-npm:
        patterns:
        - "*"
