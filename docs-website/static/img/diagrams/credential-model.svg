<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" width="700" height="520" font-family="system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08" flood-color="#1e1e1e"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="520" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="350" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1e1e1e">Credential Model: JWT + Signing Key Separation</text>
  <text x="350" y="58" text-anchor="middle" font-size="12" fill="#64748b">The core security property of aflock</text>

  <!-- ===== LEFT BOX: JWT (Agent Holds) ===== -->
  <rect x="24" y="80" width="280" height="415" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Left header bar -->
  <rect x="24" y="80" width="280" height="44" rx="8" fill="#16a34a"/>
  <rect x="24" y="100" width="280" height="24" fill="#16a34a"/>
  <text x="164" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">JWT (Agent Holds)</text>

  <!-- Left contents label -->
  <text x="44" y="150" font-size="11" font-weight="600" fill="#15803d" letter-spacing="0.5">CONTENTS</text>
  <line x1="44" y1="156" x2="284" y2="156" stroke="#bbf7d0" stroke-width="1"/>

  <!-- Left content items -->
  <circle cx="54" cy="176" r="3" fill="#16a34a"/>
  <text x="66" y="180" font-size="13" fill="#1e1e1e">Identity claims</text>

  <circle cx="54" cy="202" r="3" fill="#16a34a"/>
  <text x="66" y="206" font-size="13" fill="#1e1e1e">Granted scopes</text>

  <circle cx="54" cy="228" r="3" fill="#16a34a"/>
  <text x="66" y="232" font-size="13" fill="#1e1e1e">Expiration</text>

  <circle cx="54" cy="254" r="3" fill="#16a34a"/>
  <text x="66" y="258" font-size="13" fill="#1e1e1e">Policy digest</text>

  <!-- Left divider -->
  <line x1="44" y1="280" x2="284" y2="280" stroke="#86efac" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Agent CAN label -->
  <rect x="44" y="296" width="90" height="22" rx="4" fill="#16a34a"/>
  <text x="89" y="311" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Agent CAN</text>

  <!-- Agent CAN items -->
  <g transform="translate(44, 336)">
    <!-- Checkmark -->
    <circle cx="10" cy="0" r="9" fill="#16a34a" opacity="0.15"/>
    <path d="M6,-1 L9,2 L14,-3" stroke="#16a34a" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="26" y="4" font-size="13" fill="#1e1e1e">Present JWT</text>
  </g>

  <g transform="translate(44, 366)">
    <circle cx="10" cy="0" r="9" fill="#16a34a" opacity="0.15"/>
    <path d="M6,-1 L9,2 L14,-3" stroke="#16a34a" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="26" y="4" font-size="13" fill="#1e1e1e">Request actions</text>
  </g>

  <g transform="translate(44, 396)">
    <circle cx="10" cy="0" r="9" fill="#16a34a" opacity="0.15"/>
    <path d="M6,-1 L9,2 L14,-3" stroke="#16a34a" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="26" y="4" font-size="13" fill="#1e1e1e">Prove identity</text>
  </g>

  <!-- ===== CENTER: Security Boundary ===== -->
  <!-- Dashed vertical line -->
  <line x1="350" y1="90" x2="350" y2="485" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Lock icon group -->
  <g transform="translate(350, 268)">
    <!-- Background pill -->
    <rect x="-46" y="-36" width="92" height="72" rx="36" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>

    <!-- Lock body -->
    <rect x="-12" y="-2" width="24" height="18" rx="3" fill="#6366f1"/>
    <!-- Lock shackle -->
    <path d="M-7,-2 L-7,-10 A7,7 0 0,1 7,-10 L7,-2" stroke="#6366f1" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="0" cy="8" r="2.5" fill="#fff"/>
    <rect x="-1" y="8" width="2" height="5" rx="1" fill="#fff"/>
  </g>

  <!-- Security Boundary label -->
  <g transform="translate(350, 316)">
    <text x="0" y="0" text-anchor="middle" font-size="10" font-weight="700" fill="#6366f1" letter-spacing="1">SECURITY</text>
    <text x="0" y="14" text-anchor="middle" font-size="10" font-weight="700" fill="#6366f1" letter-spacing="1">BOUNDARY</text>
  </g>

  <!-- ===== RIGHT BOX: Signing Key (Server Holds) ===== -->
  <rect x="396" y="80" width="280" height="415" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Right header bar -->
  <rect x="396" y="80" width="280" height="44" rx="8" fill="#6366f1"/>
  <rect x="396" y="100" width="280" height="24" fill="#6366f1"/>
  <text x="536" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Signing Key (Server Holds)</text>

  <!-- Right contents label -->
  <text x="416" y="150" font-size="11" font-weight="600" fill="#4f46e5" letter-spacing="0.5">PROPERTIES</text>
  <line x1="416" y1="156" x2="656" y2="156" stroke="#c7d2fe" stroke-width="1"/>

  <!-- Right content items -->
  <circle cx="426" cy="176" r="3" fill="#6366f1"/>
  <text x="438" y="180" font-size="13" fill="#1e1e1e">Never exposed to agent</text>

  <circle cx="426" cy="202" r="3" fill="#6366f1"/>
  <text x="438" y="206" font-size="13" fill="#1e1e1e">Used to sign attestations</text>

  <circle cx="426" cy="228" r="3" fill="#6366f1"/>
  <text x="438" y="232" font-size="13" fill="#1e1e1e">Bound to agent identity</text>

  <circle cx="426" cy="254" r="3" fill="#6366f1"/>
  <text x="438" y="258" font-size="13" fill="#1e1e1e">Rotated by server</text>

  <!-- Right divider -->
  <line x1="416" y1="280" x2="656" y2="280" stroke="#a5b4fc" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Agent CANNOT label -->
  <rect x="416" y="296" width="110" height="22" rx="4" fill="#dc2626"/>
  <text x="471" y="311" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Agent CANNOT</text>

  <!-- Agent CANNOT items -->
  <g transform="translate(416, 336)">
    <circle cx="10" cy="0" r="9" fill="#dc2626" opacity="0.12"/>
    <path d="M6,-3 L14,4 M14,-3 L6,4" stroke="#dc2626" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <text x="26" y="4" font-size="13" fill="#1e1e1e">Access signing key</text>
  </g>

  <g transform="translate(416, 366)">
    <circle cx="10" cy="0" r="9" fill="#dc2626" opacity="0.12"/>
    <path d="M6,-3 L14,4 M14,-3 L6,4" stroke="#dc2626" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <text x="26" y="4" font-size="13" fill="#1e1e1e">Sign own attestations</text>
  </g>

  <g transform="translate(416, 396)">
    <circle cx="10" cy="0" r="9" fill="#dc2626" opacity="0.12"/>
    <path d="M6,-3 L14,4 M14,-3 L6,4" stroke="#dc2626" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <text x="26" y="4" font-size="13" fill="#1e1e1e">Forge signatures</text>
  </g>

  <!-- Bottom annotation -->
  <text x="350" y="512" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">Even a compromised agent cannot escalate privileges or forge attestations.</text>
</svg>