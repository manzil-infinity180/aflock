<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 480" width="750" height="480" font-family="system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#6366f1" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="750" height="480" rx="12" fill="#f8f9fc"/>

  <!-- Title -->
  <text x="375" y="30" text-anchor="middle" fill="#1e1e1e" font-size="15" font-weight="600">Session Merkle Tree</text>
  <text x="375" y="48" text-anchor="middle" fill="#9ca3af" font-size="11">Ordering proofs for session turns</text>

  <!-- ===== LEVEL 0: ROOT ===== -->
  <rect x="285" y="66" width="180" height="52" rx="8" fill="#6366f1" stroke="#4f46e5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="375" y="89" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Root Hash</text>
  <text x="375" y="106" text-anchor="middle" fill="#c7d2fe" font-size="10" font-family="ui-monospace, monospace">H(H01 || H23)</text>

  <!-- ===== CONNECTING LINES: Root to Level 1 ===== -->
  <line x1="330" y1="118" x2="210" y2="168" stroke="#818cf8" stroke-width="1.5"/>
  <line x1="420" y1="118" x2="540" y2="168" stroke="#818cf8" stroke-width="1.5"/>

  <!-- ===== LEVEL 1: INTERMEDIATE HASHES ===== -->
  <!-- Hash 0-1 -->
  <rect x="120" y="168" width="180" height="52" rx="8" fill="#818cf8" stroke="#6366f1" stroke-width="1" filter="url(#shadow)"/>
  <text x="210" y="191" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Hash 0-1</text>
  <text x="210" y="208" text-anchor="middle" fill="#e0e7ff" font-size="10" font-family="ui-monospace, monospace">H(T0 || T1)</text>

  <!-- Hash 2-3 -->
  <rect x="450" y="168" width="180" height="52" rx="8" fill="#818cf8" stroke="#6366f1" stroke-width="1" filter="url(#shadow)"/>
  <text x="540" y="191" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Hash 2-3</text>
  <text x="540" y="208" text-anchor="middle" fill="#e0e7ff" font-size="10" font-family="ui-monospace, monospace">H(T2 || T3)</text>

  <!-- ===== CONNECTING LINES: Level 1 to Leaves ===== -->
  <!-- Hash 0-1 to Turn 0 -->
  <line x1="170" y1="220" x2="115" y2="276" stroke="#a5b4fc" stroke-width="1.5"/>
  <!-- Hash 0-1 to Turn 1 -->
  <line x1="250" y1="220" x2="305" y2="276" stroke="#a5b4fc" stroke-width="1.5"/>
  <!-- Hash 2-3 to Turn 2 -->
  <line x1="500" y1="220" x2="445" y2="276" stroke="#a5b4fc" stroke-width="1.5"/>
  <!-- Hash 2-3 to Turn 3 -->
  <line x1="580" y1="220" x2="635" y2="276" stroke="#a5b4fc" stroke-width="1.5"/>

  <!-- ===== LEVEL 2: LEAVES ===== -->
  <!-- Turn 0 -->
  <rect x="45" y="276" width="140" height="56" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1" filter="url(#shadow)"/>
  <text x="115" y="300" text-anchor="middle" fill="#1e1e1e" font-size="12" font-weight="600">Turn 0</text>
  <text x="115" y="318" text-anchor="middle" fill="#6366f1" font-size="10" font-family="ui-monospace, monospace">H(turn_data_0)</text>

  <!-- Turn 1 -->
  <rect x="235" y="276" width="140" height="56" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1" filter="url(#shadow)"/>
  <text x="305" y="300" text-anchor="middle" fill="#1e1e1e" font-size="12" font-weight="600">Turn 1</text>
  <text x="305" y="318" text-anchor="middle" fill="#6366f1" font-size="10" font-family="ui-monospace, monospace">H(turn_data_1)</text>

  <!-- Turn 2 -->
  <rect x="375" y="276" width="140" height="56" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1" filter="url(#shadow)"/>
  <text x="445" y="300" text-anchor="middle" fill="#1e1e1e" font-size="12" font-weight="600">Turn 2</text>
  <text x="445" y="318" text-anchor="middle" fill="#6366f1" font-size="10" font-family="ui-monospace, monospace">H(turn_data_2)</text>

  <!-- Turn 3 -->
  <rect x="565" y="276" width="140" height="56" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1" filter="url(#shadow)"/>
  <text x="635" y="300" text-anchor="middle" fill="#1e1e1e" font-size="12" font-weight="600">Turn 3</text>
  <text x="635" y="318" text-anchor="middle" fill="#6366f1" font-size="10" font-family="ui-monospace, monospace">H(turn_data_3)</text>

  <!-- ===== DIVIDER ===== -->
  <line x1="50" y1="360" x2="700" y2="360" stroke="#e5e7eb" stroke-width="1"/>
  <text x="375" y="356" text-anchor="middle" fill="#9ca3af" font-size="9" font-weight="500" letter-spacing="1.5">GUARANTEED PROPERTIES</text>

  <!-- ===== PROPERTY CARDS ===== -->
  <!-- Property 1: Order -->
  <rect x="50" y="378" width="200" height="68" rx="8" fill="#fff" stroke="#c7d2fe" stroke-width="1" filter="url(#shadow)"/>
  <rect x="50" y="378" width="200" height="26" rx="8" fill="#6366f1"/>
  <rect x="50" y="395" width="200" height="9" fill="#6366f1"/>
  <text x="150" y="396" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Order</text>
  <text x="62" y="422" fill="#4b5563" font-size="10.5">Turn n came after</text>
  <text x="62" y="436" fill="#4b5563" font-size="10.5">turns 0..n-1</text>

  <!-- Property 2: Completeness -->
  <rect x="275" y="378" width="200" height="68" rx="8" fill="#fff" stroke="#c7d2fe" stroke-width="1" filter="url(#shadow)"/>
  <rect x="275" y="378" width="200" height="26" rx="8" fill="#6366f1"/>
  <rect x="275" y="395" width="200" height="9" fill="#6366f1"/>
  <text x="375" y="396" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Completeness</text>
  <text x="287" y="422" fill="#4b5563" font-size="10.5">No turns were</text>
  <text x="287" y="436" fill="#4b5563" font-size="10.5">omitted</text>

  <!-- Property 3: Distance -->
  <rect x="500" y="378" width="200" height="68" rx="8" fill="#fff" stroke="#c7d2fe" stroke-width="1" filter="url(#shadow)"/>
  <rect x="500" y="378" width="200" height="26" rx="8" fill="#6366f1"/>
  <rect x="500" y="395" width="200" height="9" fill="#6366f1"/>
  <text x="600" y="396" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Distance</text>
  <text x="512" y="422" fill="#4b5563" font-size="10.5">Turns are</text>
  <text x="512" y="436" fill="#4b5563" font-size="10.5">contiguous</text>

  <!-- Footer -->
  <text x="375" y="470" text-anchor="middle" fill="#9ca3af" font-size="10">Session Merkle Tree -- Cryptographic proof of turn ordering and completeness</text>
</svg>