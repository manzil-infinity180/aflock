<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 720" width="700" height="720" font-family="system-ui, sans-serif">
  <defs>
    <!-- Solid arrow marker (requests) -->
    <marker id="arrowSolid" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
    <!-- Dashed arrow marker (responses) -->
    <marker id="arrowDashed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#818cf8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="720" rx="8" fill="#fff"/>

  <!-- ==================== LIFELINE HEADERS ==================== -->
  <!-- Agent header -->
  <rect x="80" y="20" width="120" height="40" rx="8" fill="#6366f1"/>
  <text x="140" y="45" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Agent</text>

  <!-- Server header -->
  <rect x="460" y="20" width="140" height="40" rx="8" fill="#6366f1"/>
  <text x="530" y="45" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">aflock Server</text>

  <!-- ==================== LIFELINES (dashed vertical) ==================== -->
  <line x1="140" y1="60" x2="140" y2="700" stroke="#c7d2fe" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="530" y1="60" x2="530" y2="700" stroke="#c7d2fe" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ==================== MESSAGE 1: connect ==================== -->
  <!-- Activation box on Agent -->
  <rect x="134" y="90" width="12" height="30" rx="3" fill="#818cf8" opacity="0.35"/>
  <!-- Solid arrow: Agent -> Server -->
  <line x1="146" y1="105" x2="524" y2="105" stroke="#6366f1" stroke-width="1.8" marker-end="url(#arrowSolid)"/>
  <!-- Label -->
  <text x="335" y="98" text-anchor="middle" fill="#1e1e1e" font-size="12" font-weight="500">MCP: connect</text>

  <!-- Activation box on Server -->
  <rect x="524" y="105" width="12" height="55" rx="3" fill="#6366f1" opacity="0.45"/>
  <!-- Server note -->
  <rect x="548" y="107" width="145" height="50" rx="6" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="558" y="122" fill="#1e1e1e" font-size="10">PID introspection</text>
  <text x="558" y="135" fill="#1e1e1e" font-size="10">Compute identity</text>
  <text x="558" y="148" fill="#1e1e1e" font-size="10">Generate JWT</text>

  <!-- ==================== MESSAGE 2: JWT response ==================== -->
  <!-- Dashed arrow: Server -> Agent -->
  <line x1="524" y1="175" x2="146" y2="175" stroke="#818cf8" stroke-width="1.8" stroke-dasharray="7,4" marker-end="url(#arrowDashed)"/>
  <text x="335" y="168" text-anchor="middle" fill="#1e1e1e" font-size="12" font-weight="500">JWT (short-lived)</text>

  <!-- ==================== MESSAGE 3: bash cmd ==================== -->
  <!-- Activation box on Agent -->
  <rect x="134" y="210" width="12" height="30" rx="3" fill="#818cf8" opacity="0.35"/>
  <!-- Solid arrow: Agent -> Server -->
  <line x1="146" y1="225" x2="524" y2="225" stroke="#6366f1" stroke-width="1.8" marker-end="url(#arrowSolid)"/>
  <!-- Label -->
  <text x="335" y="218" text-anchor="middle" fill="#1e1e1e" font-size="12" font-weight="500">MCP: bash {cmd} + JWT</text>

  <!-- Activation box on Server -->
  <rect x="524" y="225" width="12" height="80" rx="3" fill="#6366f1" opacity="0.45"/>
  <!-- Server note -->
  <rect x="548" y="227" width="145" height="75" rx="6" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="558" y="243" fill="#1e1e1e" font-size="10">Verify JWT</text>
  <text x="558" y="256" fill="#1e1e1e" font-size="10">Check grants</text>
  <text x="558" y="269" fill="#1e1e1e" font-size="10">Execute command</text>
  <text x="558" y="282" fill="#1e1e1e" font-size="10">Create attestation</text>
  <text x="558" y="295" fill="#1e1e1e" font-size="10">Sign with SERVER key</text>

  <!-- ==================== MESSAGE 4: result + attestation ==================== -->
  <!-- Dashed arrow: Server -> Agent -->
  <line x1="524" y1="325" x2="146" y2="325" stroke="#818cf8" stroke-width="1.8" stroke-dasharray="7,4" marker-end="url(#arrowDashed)"/>
  <text x="335" y="318" text-anchor="middle" fill="#1e1e1e" font-size="12" font-weight="500">result + signed attestation</text>

  <!-- ==================== MESSAGE 5: access_secret ==================== -->
  <!-- Activation box on Agent -->
  <rect x="134" y="370" width="12" height="30" rx="3" fill="#818cf8" opacity="0.35"/>
  <!-- Solid arrow: Agent -> Server -->
  <line x1="146" y1="385" x2="524" y2="385" stroke="#6366f1" stroke-width="1.8" marker-end="url(#arrowSolid)"/>
  <!-- Label -->
  <text x="335" y="378" text-anchor="middle" fill="#1e1e1e" font-size="12" font-weight="500">MCP: access_secret + JWT</text>

  <!-- Activation box on Server -->
  <rect x="524" y="385" width="12" height="45" rx="3" fill="#6366f1" opacity="0.45"/>
  <!-- Server note -->
  <rect x="548" y="387" width="145" height="40" rx="6" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="558" y="403" fill="#1e1e1e" font-size="10">Verify JWT</text>
  <text x="558" y="416" fill="#1e1e1e" font-size="10">Check grants.secrets</text>

  <!-- ==================== MESSAGE 6: secret value ==================== -->
  <!-- Dashed arrow: Server -> Agent -->
  <line x1="524" y1="448" x2="146" y2="448" stroke="#818cf8" stroke-width="1.8" stroke-dasharray="7,4" marker-end="url(#arrowDashed)"/>
  <text x="335" y="441" text-anchor="middle" fill="#1e1e1e" font-size="12" font-weight="500">secret value</text>

  <!-- ==================== STEP NUMBERS ==================== -->
  <circle cx="30" cy="105" r="12" fill="#6366f1"/>
  <text x="30" y="109" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">1</text>

  <circle cx="30" cy="175" r="12" fill="#818cf8"/>
  <text x="30" y="179" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">2</text>

  <circle cx="30" cy="225" r="12" fill="#6366f1"/>
  <text x="30" y="229" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">3</text>

  <circle cx="30" cy="325" r="12" fill="#818cf8"/>
  <text x="30" y="329" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">4</text>

  <circle cx="30" cy="385" r="12" fill="#6366f1"/>
  <text x="30" y="389" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">5</text>

  <circle cx="30" cy="448" r="12" fill="#818cf8"/>
  <text x="30" y="452" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">6</text>

  <!-- ==================== LEGEND ==================== -->
  <rect x="30" y="510" width="640" height="1" fill="#e5e7eb"/>

  <!-- Request legend -->
  <line x1="50" y1="540" x2="110" y2="540" stroke="#6366f1" stroke-width="1.8" marker-end="url(#arrowSolid)"/>
  <text x="120" y="544" fill="#1e1e1e" font-size="11">Request</text>

  <!-- Response legend -->
  <line x1="200" y1="540" x2="260" y2="540" stroke="#818cf8" stroke-width="1.8" stroke-dasharray="7,4" marker-end="url(#arrowDashed)"/>
  <text x="270" y="544" fill="#1e1e1e" font-size="11">Response</text>

  <!-- Activation box legend -->
  <rect x="360" y="532" width="10" height="16" rx="3" fill="#6366f1" opacity="0.45"/>
  <text x="378" y="544" fill="#1e1e1e" font-size="11">Processing</text>

  <!-- Note legend -->
  <rect x="470" y="530" width="18" height="18" rx="4" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="496" y="544" fill="#1e1e1e" font-size="11">Server-side logic</text>
</svg>